<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${queryName}">连接查询结果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: '微软雅黑', '宋体', Arial, sans-serif; background-color: #f5f5f5; color: #333; font-size: 14px; }
        .top-bar { background-color: #1e3a5f; height: 8px; }
        .header { background-color: #fff; border-bottom: 1px solid #ddd; padding: 20px 0; }
        .header-inner { width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { color: #1e3a5f; font-size: 24px; font-weight: normal; }
        .logo p { color: #666; font-size: 12px; margin-top: 5px; }
        .nav { background-color: #1e3a5f; }
        .nav-inner { width: 1100px; margin: 0 auto; overflow: hidden; }
        .nav a { float: left; display: block; color: white; text-align: center; padding: 12px 20px; text-decoration: none; font-size: 14px; }
        .nav a:hover { background-color: #0f2b45; }
        .container { width: 1100px; margin: 20px auto; min-height: 500px; }
        .card { background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card h2 { font-size: 18px; padding-bottom: 10px; border-bottom: 2px solid #1e3a5f; margin-bottom: 15px; color: #1e3a5f; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f0f4f8; font-weight: normal; }
        .footer { background-color: #fff; border-top: 1px solid #ddd; text-align: center; padding: 20px; color: #666; font-size: 12px; margin-top: 40px; }
        .back-link { margin-top: 20px; }
        .back-link a { color: #1e3a5f; text-decoration: none; }
    </style>
</head>
<body>
<div class="top-bar"></div>
<div class="header">
    <div class="header-inner">
        <div class="logo">
            <h1>校园二手交易平台</h1>
            <p>Campus Second-hand Trading Platform</p>
        </div>
    </div>
</div>
<div class="nav">
    <div class="nav-inner">
        <a href="/">首页</a>
        <a href="/items">商品管理</a>
        <a href="/users">用户列表</a>
        <a href="/orders">订单列表</a>
        <a href="/unsold">未售商品</a>
        <a href="/price-gt-30">价格&gt;30</a>
        <a href="/daily-goods">生活用品</a>
        <a href="/u001-items">u001商品</a>
        <a href="/sold-with-buyer">已售商品</a>
        <a href="/order-details">订单详情</a>
        <a href="/u001-purchase-status">u001销售状态</a>
    </div>
</div>
<div class="container">
    <div class="card">
        <h2 th:text="${queryName}">连接查询结果</h2>
        <table>
            <!-- 动态显示表头：取第一行数据的列数 -->
            <thead>
            <tr th:if="${results != null and results.size() > 0}" th:each="row : ${results}" th:remove="all">
                <th th:each="col, iterStat : ${row}" th:text="'列' + ${iterStat.index + 1}">列</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${results}">
                <td th:each="col : ${row}" th:text="${col != null ? col : ''}">-</td>
            </tr>
            </tbody>
        </table>
        <div class="back-link"><a href="/">返回首页</a></div>
    </div>
</div>
<div class="footer">
    <p>校园二手交易平台 | 数据库大作业</p>
</div>
</body>
</html>
