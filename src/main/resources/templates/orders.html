<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>订单列表</title></head>
<body>
<h2>已完成订单</h2>
<table border="1">
    <tr><th>订单ID</th><th>商品ID</th><th>买家ID</th><th>日期</th></tr>
    <tr th:each="o : ${orders}">
        <td th:text="${o.orderId}"></td>
        <td th:text="${o.itemId}"></td>
        <td th:text="${o.buyerId}"></td>
        <td th:text="${o.orderDate}"></td>
    </tr>
</table>

<h2>订单详情（商品+买家+日期）</h2>
<table border="1">
    <tr><th>商品名</th><th>买家</th><th>日期</th></tr>
    <tr th:each="d : ${orderDetails}">
        <td th:text="${d[0]}"></td>
        <td th:text="${d[1]}"></td>
        <td th:text="${d[2]}"></td>
    </tr>
</table>
<a href="/">返回首页</a>
</body>
</html>
