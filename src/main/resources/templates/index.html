<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>校园二手交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: '微软雅黑', '宋体', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            font-size: 14px;
        }
        /* 顶部 */
        .top-bar {
            background-color: #1e3a5f;
            height: 8px;
        }
        .header {
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            padding: 20px 0;
        }
        .header-inner {
            width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            color: #1e3a5f;
            font-size: 24px;
            font-weight: normal;
        }
        .logo p {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        /* 导航栏 */
        .nav {
            background-color: #1e3a5f;
        }
        .nav-inner {
            width: 1100px;
            margin: 0 auto;
            overflow: hidden;
        }
        .nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 14px;
        }
        .nav a:hover {
            background-color: #0f2b45;
        }
        /* 主体 */
        .container {
            width: 1100px;
            margin: 20px auto;
            min-height: 500px;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1e3a5f;
            margin-bottom: 15px;
            color: #1e3a5f;
        }
        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #f0f4f8;
            padding: 20px;
            text-align: center;
            flex: 1;
            border: 1px solid #dce4ec;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #1e3a5f;
        }
        .stat-label {
            color: #666;
            margin-top: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f0f4f8;
            font-weight: normal;
        }
        .footer {
            background-color: #fff;
            border-top: 1px solid #ddd;
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
            margin-top: 40px;
        }
        .btn {
            background-color: #1e3a5f;
            color: white;
            border: none;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-small {
            background-color: #3a6b92;
            padding: 3px 8px;
            font-size: 12px;
            color: white;
            text-decoration: none;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            background-color: #e8f0fe;
            color: #1e3a5f;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="top-bar"></div>
<div class="header">
    <div class="header-inner">
        <div class="logo">
            <h1>校园二手交易平台</h1>
            <p>Campus Second-hand Trading Platform</p>
        </div>
    </div>
</div>
<div class="nav">
    <div class="nav-inner">
        <a href="/">首页</a>
        <a href="/items">商品管理</a>
        <a href="/users">用户列表</a>
        <a href="/orders">订单列表</a>
        <a href="/unsold">未售商品</a>
        <a href="/price-gt-30">价格&gt;30</a>
        <a href="/daily-goods">生活用品</a>
        <a href="/u001-items">u001商品</a>
        <a href="/sold-with-buyer">已售商品</a>
        <a href="/order-details">订单详情</a>
        <a href="/u001-purchase-status">u001销售状态</a>
    </div>
</div>
<div class="container">
    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-number" th:text="${totalItems}">0</div>
            <div class="stat-label">商品总数</div>
        </div>
        <div class="stat-box">
            <th:block th:text="${#numbers.formatDecimal(avgPrice, 1, 0)}">0</th:block>
            <div class="stat-label">平均价格(元)</div>
        </div>
    </div>
    <div class="card">
        <h2>商品分类统计</h2>
        <table>
            <tr>
                <th>分类</th>
                <th>数量</th>
            </tr>
            <tr th:each="c : ${categoryCount}">
                <td th:text="${c[0]}">-</td>
                <td th:text="${c[1]}">0</td>
            </tr>
        </table>
    </div>
    <div class="card">
        <h2>活跃卖家</h2>
        <p th:if="${topSeller != null and topSeller.size() > 0}">
            发布商品最多的用户：<strong th:text="${topSeller[0][0]}">u001</strong> ，共发布 <strong th:text="${topSeller[0][1]}">0</strong> 件商品
        </p>
    </div>
</div>
<div class="footer">
    <p>校园二手交易平台 | 数据库大作业</p>
</div>
</body>
</html>
